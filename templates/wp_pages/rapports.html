<!-- Rapports — contenu seul, forest green (nav/footer = Kadence natif) -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;0,400;0,700;1,300&family=Inter:wght@400;600;700&family=Space+Grotesk:wght@300;400;700&display=swap');

* { box-sizing: border-box; }

.rp-card {
  background: #ffffff;
  padding: 2rem;
  transition: box-shadow 0.2s;
  display: flex;
  flex-direction: column;
}
.rp-card:hover { box-shadow: 0 8px 30px rgba(26,31,26,0.1); }
.rp-card h2 { font-family: 'Newsreader', serif; font-size: 1.35rem; font-weight: 700; color: #1A1F1A; margin: 0 0 0.75rem; line-height: 1.3; }
.rp-card p { font-family: 'Inter', sans-serif; font-size: 0.875rem; color: #49454c; line-height: 1.625; margin: 0 0 1.25rem; flex-grow: 1; }
.rp-card-meta { font-family: 'Space Grotesk', monospace; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: #7a757d; margin-bottom: 0.75rem; }
.rp-card-link { font-family: 'Space Grotesk', monospace; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: #2D3A2D; text-decoration: none; display: inline-flex; align-items: center; font-weight: 600; }
.rp-card-link:hover { color: #8BA886; }
.rp-card-link svg { margin-left: 4px; transition: transform 0.15s; }
.rp-card-link:hover svg { transform: translate(2px, -2px); }

.rp-three-col > p, .rp-three-col > p:empty { display: none !important; margin: 0; padding: 0; }

@media (max-width: 767px) {
  .rp-three-col { grid-template-columns: 1fr !important; }
  .rp-hero-title { font-size: 2.5rem !important; }
}
</style>

<!-- HERO -->
<section style="background:#1A1F1A;padding:5rem 2rem 4rem;text-align:center;">
  <h1 class="rp-hero-title" style="font-family:'Newsreader',serif;font-size:3.5rem;font-weight:400;color:#ffffff;margin:0 0 1rem;">Toutes les analyses</h1>
  <p style="font-family:'Inter',sans-serif;font-size:1.1rem;color:#C2D0BC;max-width:560px;margin:0 auto;line-height:1.7;font-style:italic;">
    Intelligence de march&eacute; aliment&eacute;e par l'IA. Chaque rapport d&eacute;crypte une tendance &eacute;mergente.
  </p>
</section>

<!-- REPORT CARDS -->
<section style="background:#EDE8E2;padding:4rem 2rem;">
<div style="max-width:80rem;margin:0 auto;">
<div class="rp-three-col" style="display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;">
{{REPORT_CARDS}}
</div>
</div>
</section>

<!-- CTA -->
<section style="background:#1A1F1A;padding:4rem 2rem;text-align:center;">
  <h2 style="font-family:'Newsreader',serif;font-size:2rem;font-weight:400;color:#ffffff;margin:0 0 1rem;">Recevoir le prochain rapport</h2>
  <p style="font-family:'Inter',sans-serif;font-size:0.95rem;color:#C2D0BC;margin:0 auto 2rem;max-width:420px;">
    2 analyses Trend Signal par mois, gratuitement.
  </p>
  <a href="https://hemle.blog/sabonner/" style="display:inline-block;background:#2D3A2D;color:#ffffff;padding:0.75rem 2rem;font-family:'Space Grotesk',monospace;font-size:0.8rem;font-weight:600;text-decoration:none;letter-spacing:0.05em;text-transform:uppercase;">S'abonner gratuitement &rarr;</a>
</section>
